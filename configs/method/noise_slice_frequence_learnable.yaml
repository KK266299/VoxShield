training:
  model_save_start: 9999
  model_save_freq: 10
  epochs: 100
  batch_size: 8
  num_workers: 0
  sampler:
    name: pk
    p: 4
    k: 2
  data:
    poison:
      enabled: false
    transforms:
      geom_aug: false
      intensity_aug: false
      normalize: false

ue:
  store_dir: ${task.save_dir}/${task.run_name}/${now:%Y%m%d_%H%M%S}/noise

  key:
    type: samplewise
    from: field
    field: case_id

  algorithm:
    kind: training_based
    name: noise_slice_frequence_learnable
    params:
      # === Perturbation Bound ===
      epsilon: 0.0156863        # 4/255 L_inf bound

      # === Training ===
      noise_step: 1
      surrogate_step: 10

      # === ROI Mask Settings ===
      roi_aware: true
      soft_edge: false
      dilate_iterations: 2
      dilate_kernel_size: 3
      gaussian_sigma: 2.0

      z_diversity_weight: 0.0

      # === Logits Divergence Loss (L1) ===
      logits_div_enabled: true
      logits_div_weight: 0.01

  # Noise UNet configuration
  noise_unet:
    channels: [16, 32, 64, 128]
    strides: [2, 2, 2]
    num_res_units: 1
    act: "LEAKYRELU"
    norm: "INSTANCE"
    dropout: 0.0
    optimizer:
      name: adam
      lr: 1e-4
      weight_decay: 1e-5
      betas: [0.9, 0.999]

  eot:
    enabled: false
    n: 3
    geom_aug: true
    pix_aug: true
    same_on_batch: false

  surrogates:
    s_seg:
      backbone: unet
      in_channels: 1
      num_classes: 5
      spatial_dims: 3
      channels: [32, 64, 128, 256, 512]
      strides: [2, 2, 2, 2]
      num_res_units: 2
      norm: "INSTANCE"
      act: "RELU"
      dropout: 0.0
      optimizer: { name: adam, lr: 5e-4, weight_decay: 5e-4, betas: [0.9, 0.9999], eps: 1.0e-8 }

  io:
    enabled: true
    include_manifest: true
    strategy: files
    dtype: int8
    save_from_epoch: 50
    save_every: 10
